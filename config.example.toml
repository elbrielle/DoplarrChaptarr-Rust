# Doplarr Configuration Example
# Copy this file to config.toml and update with your settings
#
# Any value can pull from an environment variable with ${VAR}, e.g.
#   api_key = "${SEERR_API_KEY}"
# An unset referenced variable is a startup error; ${...} in comments is ignored.

# ==============================================================================
# REQUIRED SETTINGS
# ==============================================================================

# Your Discord bot token (from Discord Developer Portal)
discord_token = "${DISCORD_TOKEN}"

# ==============================================================================
# OPTIONAL GLOBAL SETTINGS
# ==============================================================================

# Logging level (default: "info")
# Format: "target=level" or just "level"
# Levels: error, warn, info, debug, trace
# Examples:
#   log_level = "info"
#   log_level = "doplarr=debug"
#   log_level = "doplarr=debug,twilight_gateway=warn"
log_level = "info"

# Make follow-up messages public (default: true)
# When true, successful requests are announced in the channel
# When false, all bot responses are ephemeral (only visible to requester)
# Note: Requires "Send Messages" permission in Discord when enabled
public_followup = true

# ==============================================================================
# BACKENDS
# ==============================================================================
# Each [[backends]] entry creates a Discord slash command: /request <media>
#
# Key concepts:
# - "media" is the slash command name (must be unique)
# - You can have multiple backends of the same type (Radarr/Sonarr)
# - Backends can point to the same instance with different settings
#
# Examples:
# - /request movie     -> Standard movies
# - /request movie_4k  -> 4K movies (same or different Radarr)
# - /request series    -> TV shows
# - /request anime     -> Anime (separate Sonarr or same with different settings)

# ------------------------------------------------------------------------------
# RADARR BACKEND (Movies)
# ------------------------------------------------------------------------------

[[backends]]
media = "movie"

[backends.config.Radarr]
url = "http://localhost:7878"
api_key = "your_radarr_api_key"

# All settings below are OPTIONAL
# If omitted, users will select them at runtime via Discord UI

# Quality profile name (must match exactly what's in Radarr)
# quality_profile = "HD-1080p"

# Root folder path (must exist in Radarr)
# rootfolder = "/movies"

# Monitor type: movieOnly, movieAndCollection, none
# monitor_type = "movieOnly"

# Minimum availability: tba, announced, inCinemas, released
# minimum_availability = "announced"

# ------------------------------------------------------------------------------
# RADARR BACKEND - 4K Example (same instance, different settings)
# ------------------------------------------------------------------------------
# Uncomment this section to add a separate /request movie_4k command

# [[backends]]
# media = "movie_4k"
#
# [backends.config.Radarr]
# url = "http://localhost:7878"           # Same Radarr instance
# api_key = "your_radarr_api_key"
# quality_profile = "Ultra-HD"            # Different quality profile
# rootfolder = "/movies/4k"               # Different root folder
# monitor_type = "movieOnly"
# minimum_availability = "announced"

# ------------------------------------------------------------------------------
# SONARR BACKEND (TV Series)
# ------------------------------------------------------------------------------

[[backends]]
media = "series"

[backends.config.Sonarr]
url = "http://localhost:8989"
api_key = "your_sonarr_api_key"

# All settings below are OPTIONAL
# If omitted, users will select them at runtime via Discord UI

# Quality profile name (must match exactly what's in Sonarr)
# quality_profile = "WEB-1080p"

# Root folder path (must exist in Sonarr)
# rootfolder = "/tv"

# Use season folders (default: user selects at runtime)
# season_folders = true

# Offer Season 0 (specials) in the season picker (default: false)
# allow_specials = true

# Offer an "All Seasons" option that monitors all current AND future seasons
# (sets Sonarr's monitorNewItems). Default: true. Set to false to make users
# pick individual seasons only.
# allow_all_seasons = false

# Series type: standard, daily, anime
# Never shown to users. If unset, anime is auto-detected from the
# series' genres and everything else is treated as standard
# series_type = "standard"

# Note: requesters pick exactly which seasons to monitor via a multi-select
# menu - both for new series and for adding seasons to existing ones - so there
# is no monitor-type setting for Sonarr.

# ------------------------------------------------------------------------------
# SONARR BACKEND - Anime Example (separate instance)
# ------------------------------------------------------------------------------
# Uncomment this section to add a separate /request anime command

# [[backends]]
# media = "anime"
#
# [backends.config.Sonarr]
# url = "http://localhost:8990"           # Separate Sonarr instance for anime
# api_key = "your_anime_sonarr_api_key"
# quality_profile = "Anime"
# rootfolder = "/anime"
# series_type = "anime"
# season_folders = true

# ------------------------------------------------------------------------------
# SEERR BACKEND (Movies + TV)
# ------------------------------------------------------------------------------
# Seerr handles both movies and TV in a single backend entry.
# Requires an admin API key (Settings → API Key in Seerr).
#
# Users are matched to their Seerr account via Discord User ID.
# To link, users go to: Seerr Profile → Settings → Notifications → Discord
# and enter their Discord User ID.

# [[backends]]
# media = "media"
#
# [backends.config.Seerr]
# url = "http://localhost:5055"
# api_key = "your_seerr_admin_api_key"
#
# # Optional: attribute requests from unlinked Discord users to this Seerr user ID.
# # If absent, unlinked users are rejected with guidance on how to link their account.
# # fallback_user_id = 1
#
# # Optional: present a "Standard / 4K" quality choice to users (default: false).
# # Only enable if your Seerr instance has 4K servers configured.
# # allow_4k = true
#
# # Optional: offer an "All Seasons" option in the TV season picker (default: true).
# # Sends Seerr's "all" sentinel; future-season behavior follows your Sonarr setup.
# # allow_all_seasons = false
#
# # Optional: restrict search results to a single media kind ("movie" or "tv").
# # When absent, both movies and TV shows are returned.
# # Useful when configuring separate /request movie and /request series commands:
#
# [[backends]]
# media = "movie"
#
# [backends.config.Seerr]
# url = "http://localhost:5055"
# api_key = "your_seerr_admin_api_key"
# media_filter = "movie"
#
# [[backends]]
# media = "series"
#
# [backends.config.Seerr]
# url = "http://localhost:5055"
# api_key = "your_seerr_admin_api_key"
# media_filter = "tv"

# ------------------------------------------------------------------------------
# CHAPTARR BACKENDS (Ebooks + Audiobooks)
# ------------------------------------------------------------------------------
# Configure both entries to add the two commands provided by DoplarrChaptarr:
#   /request book
#   /request audiobook
#
# `format` is required and controls the format requested by that command.
# The six root/profile settings are optional. An omitted value is auto-selected
# only when Chaptarr exposes exactly one valid option; ambiguous values fail
# startup and must be configured explicitly. When present, names and paths must
# match Chaptarr exactly. Both entries carry both formats' defaults because a
# newly added author must be initialized with Chaptarr's ebook and audiobook
# settings even though the command requests only one format.

[[backends]]
media = "book"

[backends.config.Chaptarr]
url = "http://localhost:8789"
api_key = "${CHAPTARR_API_KEY}"
format = "ebook"

# ebook_rootfolder = "/books"
# audiobook_rootfolder = "/audiobooks"
# ebook_quality_profile = "E-Book"
# audiobook_quality_profile = "Audiobook"
# ebook_metadata_profile = "Ebook Default"
# audiobook_metadata_profile = "Audiobook Default"
# openlibrary_covers = true

[[backends]]
media = "audiobook"

[backends.config.Chaptarr]
url = "http://localhost:8789"
api_key = "${CHAPTARR_API_KEY}"
format = "audiobook"

# ebook_rootfolder = "/books"
# audiobook_rootfolder = "/audiobooks"
# ebook_quality_profile = "E-Book"
# audiobook_quality_profile = "Audiobook"
# ebook_metadata_profile = "Ebook Default"
# audiobook_metadata_profile = "Audiobook Default"
# openlibrary_covers = true
