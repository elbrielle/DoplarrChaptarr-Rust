name: CI

on:
    push:
        branches: [main]
        paths-ignore: &docs-paths
            - '**.md'
            - '.github/ISSUE_TEMPLATE/**'
            - 'LICENSE-*'
            - 'logos/**'
            - 'screenshots/**'
    pull_request:
        branches: [main]
        paths-ignore: *docs-paths
    workflow_dispatch:

# Cancel superseded runs for the same branch/PR - these nix jobs are heavy.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    check:
        name: Nix Flake Check
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write # upload clippy findings as code scanning results
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install Nix
              uses: DeterminateSystems/determinate-nix-action@v3

            # Compiles clippy once and emits a SARIF report with repo-relative
            # paths. Built before the gate so the report uploads even when there
            # are findings (the flake check's `clippy` gate then fails the run).
            - name: Build clippy SARIF report
              run: nix build .#clippy-sarif --print-build-logs --out-link clippy-result

            # Fork PRs get a read-only token (no security-events: write), so
            # this upload 403s for them - don't let that fail the run; the
            # clippy gate in the flake check is the real enforcement.
            - name: Upload clippy SARIF
              if: always()
              continue-on-error: true
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: clippy-result/clippy.sarif
                  category: clippy

            - name: Run flake checks
              run: nix flake check --print-build-logs --keep-going

    docker-image:
        name: Build and smoke-test Docker image
        needs: check
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            IMAGE_REPOSITORY: ghcr.io/elbrielle/doplarrchaptarr-rust
            IMAGE_TAG: ghcr.io/elbrielle/doplarrchaptarr-rust:ci-${{ github.sha }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install Nix
              uses: DeterminateSystems/determinate-nix-action@v3

            # This runs for every non-documentation CI event. Publishing is a
            # separate, explicitly gated job below, so pull requests can test
            # the real artifact without gaining package-write permission.
            - name: Build exact Docker image
              run: |
                  nix build .#dockerImage --print-build-logs --out-link image-result
                  docker load --input image-result
                  docker tag "$IMAGE_REPOSITORY:latest" "$IMAGE_TAG"

            - name: Smoke-test image startup contract
              run: .github/ci/smoke-image.sh "$IMAGE_TAG"

            - name: Package immutable test artifact
              id: package
              shell: bash
              run: |
                  archive="doplarrchaptarr-rust-${GITHUB_SHA}.tar"
                  docker save --output "$archive" "$IMAGE_TAG"
                  sha256sum "$archive" > "${archive}.sha256"
                  docker image inspect "$IMAGE_TAG" > "${archive}.inspect.json"
                  printf '%s\n' "$IMAGE_TAG" > "${archive}.tag.txt"
                  echo "archive=$archive" >> "$GITHUB_OUTPUT"

            # Workflow artifacts require repository read access and are not a
            # public container release. The SHA tag and checksum make the exact
            # tested image identifiable when the owner loads it on Moonrock.
            - name: Upload image for owner testing
              uses: actions/upload-artifact@v7
              with:
                  name: doplarrchaptarr-rust-image-${{ github.sha }}
                  path: |
                      ${{ steps.package.outputs.archive }}
                      ${{ steps.package.outputs.archive }}.sha256
                      ${{ steps.package.outputs.archive }}.inspect.json
                      ${{ steps.package.outputs.archive }}.tag.txt
                  if-no-files-found: error
                  retention-days: 14
                  compression-level: 0

    publish-main:
        name: Publish main image (gated)
        needs: docker-image
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            vars.PUBLISH_MAIN_IMAGE == 'true'
        permissions:
            contents: read
            packages: write
        env:
            IMAGE_REPOSITORY: ghcr.io/elbrielle/doplarrchaptarr-rust
            IMAGE_TAG: ghcr.io/elbrielle/doplarrchaptarr-rust:ci-${{ github.sha }}
        steps:
            - name: Download tested image
              uses: actions/download-artifact@v8
              with:
                  name: doplarrchaptarr-rust-image-${{ github.sha }}
                  path: image-artifact

            - name: Verify and load tested image
              shell: bash
              run: |
                  cd image-artifact
                  sha256sum --check "doplarrchaptarr-rust-${GITHUB_SHA}.tar.sha256"
                  docker load --input "doplarrchaptarr-rust-${GITHUB_SHA}.tar"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push tested Docker image
              run: |
                  docker tag "$IMAGE_TAG" "$IMAGE_REPOSITORY:sha-${GITHUB_SHA}"
                  docker tag "$IMAGE_TAG" "$IMAGE_REPOSITORY:main"
                  docker push "$IMAGE_REPOSITORY:sha-${GITHUB_SHA}"
                  docker push "$IMAGE_REPOSITORY:main"
